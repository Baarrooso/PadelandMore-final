version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: tmanager
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: .
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: example
      DB_NAME: tmanager
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  db_data:

