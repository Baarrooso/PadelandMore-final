version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: padelandmore
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/tmanager.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build: .
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: example
      DB_NAME: padelandmore
    ports:
      - "3000:3000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  db_data:

